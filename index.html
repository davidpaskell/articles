<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Theory Article Collection </title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        header {
            background: #1f4e79;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.4rem;
        }

        header p {
            margin-top: 10px;
            opacity: 0.9;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .article {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        .article h2 {
            margin-top: 0;
            color: #1f4e79;
        }

        .article p {
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            background: #1f4e79;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            transition: background .3s;
        }

        .button:hover {
            background: #163b5d;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #777;
            font-size: 0.9rem;
        }

        @media (max-width:600px){
            header h1{
                font-size:2rem;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>David Paskell's Article Library</h1>
    <p>A collection of articles available as PDF downloads.</p>
</header>

<main>

    <div class="article">
        <h2>Two to Sin One to Win</h2>
        <p>
            A philosophical framework providing a reformed solution to the mystery of why evil exists in life. 
        </p>

        <a class="button" href="TwotoSinOnetoWin.pdf" target="_blank">
            Read PDF
        </a>
        
    </div>

   
</main>

<footer>
    © 2026 David Paskell
</footer>

</body>
</html>
